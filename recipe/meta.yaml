{% set name = "sortmerna" %}
{% set version = "7.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name }}/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 9bdd087a2b086dbffae5200e6990296231f0b541e391f701727e37ac50f92629

build:
  number: 0
  # we decided to skip linux-ppc64le due to lack of maintainer interest
  # https://github.com/conda-forge/sortmerna-feedstock/pull/7
  skip: true  # [ppc64le]
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja
    - git
  host:
    - python
    - pyyaml
    - jinja2
    - requests
  run:
    - python

test:
  commands:
    - {{ name }} -h

about:
  home: http://bioinfo.lifl.fr/RNA/sortmerna
  dev_url: https://github.com/sortmerna/sortmerna
  doc_url: https://sortmerna.readthedocs.io/en/latest/
  license: GPL-3.0-or-later AND LGPL-3.0-or-later
  license_file:
    - LICENSE.txt
    - LICENSE.LESSER.txt
    - RocksDB.LICENSE.Apache
    - ZLib.LICENSE
  summary: SortMeRNA is a biological sequence analysis tool for filtering, mapping and OTU-picking NGS reads.

extra:
  recipe-maintainers:
    - biocodz
