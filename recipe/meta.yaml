{% set name = "sortmerna" %}
{% set version = "4.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name }}/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: f7c93740f3003903704201b2e0d3103dba586350d6521f295f8989c600b87347

build:
  number: 0
  skip: true  # [win]
  # we decided to skip linux-ppc64le due to lack of maintainer interest
  # https://github.com/conda-forge/sortmerna-feedstock/pull/7
  skip: true  # [ppc64le]
  # Using nocona CPU target to ensure maximum compatibility across x86_64 systems
  # This prevents illegal instruction errors on systems without newer CPU features

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - git
  host:
    - python
    - pyyaml
    - jinja2
    - requests
    - ninja
  run:
    - python

test:
  commands:
    - {{ name }} -h # [not win]
    - {{ name }}.exe -h # [win]

about:
  home: http://bioinfo.lifl.fr/RNA/sortmerna
  dev_url: https://github.com/sortmerna/sortmerna
  doc_url: https://sortmerna.readthedocs.io/en/latest/
  license: GPL-3.0-or-later AND LGPL-3.0-or-later
  license_file:
    - LICENSE.txt
    - LICENSE.LESSER.txt
    - RocksDB.LICENSE.Apache
    - ZLib.LICENSE
  summary: SortMeRNA is a biological sequence analysis tool for filtering, mapping and OTU-picking NGS reads.

extra:
  recipe-maintainers:
    - biocodz
